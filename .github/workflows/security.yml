# Esta etapa corre DESPUÉS de las etapas anteriores (ver "needs").
  # ═══════════════════════════════════════════════════════════════════════════
  tests:
    name: Tests - pytest
    name: Unit Tests - Pytest
    runs-on: ubuntu-latest
    needs: [ sast, sca ]   # espera a que SAST y SCA terminen primero
    needs: [sast, sca] # Espera a que la seguridad termine para no gastar recursos si hay fallos graves

    steps:
      - name: Checkout del repositorio
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/requirements.txt
          pip install pytest

      - name: Ejecutar tests
        run: pytest Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/tests/ -v

